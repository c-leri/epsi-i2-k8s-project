<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Application de con</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0c;
      --surface: #111116;
      --border: #1e1e2a;
      --accent: #e8ff47;
      --accent2: #7b61ff;
      --text: #e0e0f0;
      --muted: #5a5a7a;
      --code-bg: #0d0d14;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(123, 97, 255, 0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 720px;
      padding: 0 24px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      padding: 48px 0 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .tag {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent2);
      opacity: 0.7;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(52px, 10vw, 96px);
      letter-spacing: 4px;
      line-height: 1;
      color: var(--text);
      text-align: center;
    }
    h1 span {
      color: var(--accent);
      position: relative;
    }
    h1 span::after {
      content: '';
      position: absolute;
      bottom: 4px;
      left: 0; right: 0;
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
      opacity: 0.5;
    }
    .divider {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent2), transparent);
      margin: 8px 0 0;
    }
    .btn-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }
    .press-btn {
      position: relative;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 5px;
      padding: 18px 64px;
      cursor: pointer;
      transition: all 0.2s ease;
      outline: none;
      overflow: hidden;
      clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
    }
    .press-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
      z-index: 0;
    }
    .press-btn span {
      position: relative;
      z-index: 1;
      transition: color 0.25s ease;
    }
    .press-btn:hover::before { transform: scaleX(1); }
    .press-btn:hover span { color: #0a0a0c; }
    .press-btn:active { transform: scale(0.97); }
    .press-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }
    .result-wrapper {
      width: 100%;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .result-wrapper.open { max-height: 600px; }
    .result-panel {
      margin-top: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--accent2);
      padding: 28px 32px;
      width: 100%;
      position: relative;
    }
    .result-panel::before {
      content: '// OUTPUT';
      position: absolute;
      top: -10px;
      left: 20px;
      background: var(--surface);
      padding: 0 8px;
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--accent2);
    }
    .panel-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .sql-block {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent2);
      padding: 14px 18px;
      font-size: 13px;
      color: var(--accent2);
      margin-bottom: 24px;
      word-break: break-all;
      line-height: 1.7;
    }
    .result-text {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .joke-output {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      padding: 16px 18px;
      font-size: 14px;
      color: var(--text);
      line-height: 1.8;
    }
    .joke-id {
      display: inline-block;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(232, 255, 71, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .cooldown-bar {
      height: 2px;
      background: var(--accent2);
      width: 0%;
      margin-top: 16px;
      opacity: 0;
    }
    .cooldown-bar.active {
      opacity: 1;
      animation: cooldown 1.5s linear forwards;
    }
    @keyframes cooldown {
      from { width: 100%; }
      to { width: 0%; }
    }
    .fade-in { animation: fadeIn 0.35s ease forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    footer {
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      text-align: center;
      padding: 12px;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 2px;
      z-index: 10;
      background: linear-gradient(transparent, var(--bg) 60%);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <span class="tag">v1.0.0 — système critique</span>
      <h1>Application<br>de <span>con</span></h1>
      <div class="divider"></div>
    </header>
    <div class="btn-zone">
      <button class="press-btn" id="pressBtn" onclick="fetchJoke()">
        <span>Press Me</span>
      </button>
      <div class="cooldown-bar" id="cooldownBar"></div>
      <div class="result-wrapper" id="resultWrapper">
        <div class="result-panel">
          <div class="panel-label">Requête envoyée à la base de données</div>
          <div class="sql-block" id="sqlDisplay">—</div>
          <div class="result-text">Résultat</div>
          <div class="joke-output" id="jokeDisplay">
            <span class="joke-id" id="jokeId"></span>
            <br id="jokeBr" style="display:none">
            <span id="jokeText">—</span>
          </div>
        </div>
      </div>
    </div>
  </div>
  <footer>APPLICATION DE CON &nbsp;·&nbsp; BACKEND: POSTGRESQL &nbsp;·&nbsp; NODE.JS</footer>
  <script>
    const BACKEND_URL = 'http://localhost:3001';
    let cooldown = false;
    async function fetchJoke() {
      if (cooldown) return;
      const btn = document.getElementById('pressBtn');
      const wrapper = document.getElementById('resultWrapper');
      const sqlDisplay = document.getElementById('sqlDisplay');
      const jokeText = document.getElementById('jokeText');
      const jokeId = document.getElementById('jokeId');
      const jokeBr = document.getElementById('jokeBr');
      const cooldownBar = document.getElementById('cooldownBar');
      btn.disabled = true;
      sqlDisplay.innerHTML = '<span class="spinner"></span> Execution en cours...';
      jokeText.textContent = '...';
      jokeId.textContent = '';
      jokeBr.style.display = 'none';
      wrapper.classList.add('open');
      try {
        const res = await fetch(`${BACKEND_URL}/joke`);
        const data = await res.json();
        sqlDisplay.classList.remove('fade-in');
        void sqlDisplay.offsetWidth;
        sqlDisplay.classList.add('fade-in');
        sqlDisplay.textContent = data.query;
        jokeId.textContent = `row_id: ${data.result.id}`;
        jokeBr.style.display = '';
        jokeText.classList.remove('fade-in');
        void jokeText.offsetWidth;
        jokeText.classList.add('fade-in');
        jokeText.textContent = data.result.joke;
      } catch (err) {
        sqlDisplay.textContent = 'ERREUR DE CONNEXION AU BACKEND';
        jokeText.textContent = err.message;
      }
      cooldown = true;
      cooldownBar.classList.remove('active');
      void cooldownBar.offsetWidth;
      cooldownBar.classList.add('active');
      setTimeout(() => {
        btn.disabled = false;
        cooldown = false;
        cooldownBar.classList.remove('active');
      }, 1500);
    }
  </script>
</body>
</html>
